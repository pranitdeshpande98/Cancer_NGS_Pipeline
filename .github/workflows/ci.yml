name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-pipeline-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ngs-tools Docker image
        run: docker build -t ngs-tools ./pipeline

  pipeline-smoke-test:
    runs-on: ubuntu-latest
    needs: build-pipeline-image
    steps:
      - uses: actions/checkout@v4

      - name: Build ngs-tools image
        run: docker build -t ngs-tools ./pipeline

      - name: Download BRCA1 reference
        run: curl -s "https://rest.ensembl.org/sequence/region/human/17:43044292-43170245?content-type=text/x-fasta" -o brca1_genomic.fasta

      - name: Simulate reads and align
        run: |
          docker run --rm -v ${{ github.workspace }}:/work ngs-tools bash -c "
            wgsim -N 2000 -1 100 -2 100 -e 0.01 -r 0.001 -S 42 brca1_genomic.fasta reads_1.fastq reads_2.fastq > true_mutations.txt &&
            bwa index brca1_genomic.fasta &&
            bwa mem brca1_genomic.fasta reads_1.fastq reads_2.fastq > aligned.sam &&
            samtools sort -o aligned.sorted.bam aligned.sam &&
            samtools index aligned.sorted.bam &&
            samtools flagstat aligned.sorted.bam
          "

      - name: Verify reads aligned successfully
        run: |
          docker run --rm -v ${{ github.workspace }}:/work ngs-tools bash -c "
            samtools flagstat aligned.sorted.bam | grep -q '100.00%' && echo 'Smoke test passed'
          "

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flask psycopg2-binary flask-cors
      - name: Check Python syntax
        run: python -m py_compile backend/app.py pipeline/orchestrate.py pipeline/annotation/annotate.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build